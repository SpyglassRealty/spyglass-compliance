services:
  - type: web
    name: spyglass-compliance
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: spyglass-compliance-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: BASE_URL
        value: https://compliance.spyglassrealty.com
      - key: PORT
        value: 3000
      - key: UPLOAD_DIR
        value: ./uploads
      - key: CDA_OUTPUT_DIR
        value: ./uploads/cdas
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: BCRYPT_ROUNDS
        value: 12

databases:
  - name: spyglass-compliance-db
    databaseName: spyglass_compliance
    user: spyglass
    plan: starter